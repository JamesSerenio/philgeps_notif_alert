[phases.setup]
nixPkgs = ["nodejs_22"]

aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libgtk-3-0",
  "libpango-1.0-0",
  "libcairo2",
  "libx11-6",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2"
]

[phases.install]
cmds = [
  "npm install",
  "npx playwright install chromium"
]

[start]
cmd = "npm start"